<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>test</title></head>
<body>
<div id="out">loading...</div>
<script>
async function test(){
  var el=document.getElementById("out");
  try{
    el.textContent="fetching manifest...";
    var r=await fetch("data/manifest.json");
    var manifest=await r.json();
    el.textContent="manifest OK: "+manifest.length+" dates. Loading "+manifest[0]+"...";
    var r2=await fetch("data/"+manifest[0]+".json");
    var data=await r2.json();
    el.textContent="SUCCESS: "+data.length+" items. First: "+data[0].title;
  }catch(e){
    el.textContent="ERROR: "+e.message;
  }
}
test();
</script>
</body></html>
